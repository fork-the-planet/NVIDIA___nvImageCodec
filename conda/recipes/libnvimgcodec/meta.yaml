{% set version = "0.9.0" %}
{% set somajor = version.split('.')[0] %}
{% set cuda_major = (cuda_compiler_version or "").split(".")[0] %}
{% set nvimgcodec_libdir = "lib/libnvimgcodec/" ~ cuda_major %}
{% set nvimgcodec_extdir = nvimgcodec_libdir ~ "/extensions" %}
{% set nvimgcodec_cmakedir = nvimgcodec_libdir ~ "/cmake/nvimgcodec" %}
{% set nvimgcodec_win_libdir = "Library/lib/libnvimgcodec/" ~ cuda_major %}
{% set nvimgcodec_win_bindir = "Library/bin/" ~ cuda_major %}
{% set nvimgcodec_win_extdir = nvimgcodec_win_bindir ~ "/extensions" %}
{% set nvimgcodec_win_extlibdir = nvimgcodec_win_libdir ~ "/extensions" %}
{% set nvimgcodec_win_cmakedir = nvimgcodec_win_libdir ~ "/cmake/nvimgcodec" %}

package:
  name: libnvimgcodec-split
  version: {{ version }}

source:
  url: https://github.com/NVIDIA/nvImageCodec/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d3beeb09fbecd0ff24800a6549d8edb7739cf1d44554f9c92ee31a0cf8d4890b
  patches:
    - patches/0003-BLD-Make-find_package-OpenCV-verbose-and-required.patch
    - patches/0004-BLD-Disable-non-standard-CUDA-arch-checking.patch
build:
  number: 1
  skip: true  # [((cuda_compiler_version or "None") == "None")]
  # skip: true  # [((cuda_compiler_version or "") == "12.6") and ((libopencv or "") == "4.10") ]
requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cuda') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
    - cmake 3.*
    - ninja
    - pkg-config
  host:
    - cuda-version {{ cuda_compiler_version }}
    - cuda-cudart-dev
    - cuda-driver-dev  # [linux]
    - cuda-culibos-static  # [linux and (cuda_compiler_version or "").startswith("13")]
    - libnvjpeg-dev
    - libnvjpeg2k-dev
    - libnvtiff-dev
    - libboost-headers
    - libjpeg-turbo
    # libopencv >=4.13.0 is required for our 12-bit JP2 decode tests through the
    # opencv extension: 4.13.0 build 8 is the first conda-forge libopencv built
    # with WITH_OPENJPEG=1. Keep this on OpenCV 4 until the CMake package
    # discovery supports OpenCV 5 config packages.
    - libopencv >=4.13.0,<5
    - libopencv * headless*
    - libtiff
    - nvtx-c
    - zlib
    - zstd

outputs:

  - name: libnvimgcodec-dev
    build:
      run_exports:
        # FIXME: both run_exports max_pin=None when library is stable
        - {{ pin_subpackage('libnvimgcodec', max_pin="x.x.x") }}
        - {{ pin_subpackage('libnvimgcodec' ~ somajor, max_pin="x.x.x") }}
      ignore_run_exports:
        - cuda-version
    files:
      # This recipe requires conda-build 24.7 or later
      include:
        - include/**  # [linux]
        - {{ nvimgcodec_libdir }}/libnvimgcodec.so  # [linux]
        - {{ nvimgcodec_cmakedir }}  # [linux]
        - {{ nvimgcodec_extdir }}/*.so  # [linux]
        # FIXME: Drop static libraries once CMake config supports it
        - {{ nvimgcodec_libdir }}/libnvimgcodec_static.a  # [linux]
        - Library/include/**  # [win]
        - {{ nvimgcodec_win_libdir }}/nvimgcodec.lib  # [win]
        - {{ nvimgcodec_win_cmakedir }}  # [win]
        - {{ nvimgcodec_win_extlibdir }}/*.lib  # [win]
        # FIXME: Drop static libraries once CMake config supports it
        - {{ nvimgcodec_win_libdir }}/nvimgcodec_static.lib  # [win]
      exclude:
        - lib/python*  # [linux]
        - {{ nvimgcodec_libdir }}/libnvimgcodec.so.*  # [linux]
        - {{ nvimgcodec_extdir }}/*.so.*  # [linux]
    requirements:
      host:
        - {{ pin_subpackage('libnvimgcodec' ~ somajor, exact=True) }}
        - cuda-version {{ cuda_compiler_version }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      run:
        - {{ pin_subpackage('libnvimgcodec' ~ somajor, exact=True) }}
        - {{ pin_compatible('cuda-version', min_pin="x", max_pin="x") }}
    test:
      files:
        - test
      script: run_test.bat  # [win]
      requires:   # [build_platform == target_platform]
        - {{ compiler('c') }}  # [build_platform == target_platform]
        - {{ compiler('cxx') }}  # [build_platform == target_platform]
        - {{ compiler('cuda') }}  # [build_platform == target_platform]
        - {{ stdlib('c') }}  # [build_platform == target_platform]
        - cmake   # [build_platform == target_platform]
        - ninja  # [build_platform == target_platform]
        - cuda-cudart-dev  # [build_platform == target_platform]
      commands:
        - test -f ${PREFIX}/include/nvimgcodec.h  # [linux]
        - if not exist %LIBRARY_INC%\\nvimgcodec.h exit 1  # [win]
        - test -f ${PREFIX}/{{ nvimgcodec_libdir }}/libnvimgcodec.so.{{ somajor }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_libdir }}/libnvimgcodec.so.{{ version }}  # [linux]
        - if not exist %LIBRARY_LIB%\\libnvimgcodec\\{{ cuda_major }}\\nvimgcodec.lib exit 1  # [win]
        - if not exist %LIBRARY_LIB%\\libnvimgcodec\\{{ cuda_major }}\\extensions\\nvbmp_ext.lib exit 1  # [win]
        - if not exist %LIBRARY_LIB%\\libnvimgcodec\\{{ cuda_major }}\\extensions\\nvbmp_ext_static.lib exit 1  # [win]
        - test -f ${PREFIX}/{{ nvimgcodec_cmakedir }}/nvimgcodecConfig.cmake  # [unix]
        - if not exist %LIBRARY_LIB%\\libnvimgcodec\\{{ cuda_major }}\\cmake\\nvimgcodec\\nvimgcodecConfig.cmake exit 1  # [win]
        - cmake ${CMAKE_ARGS} -Dnvimgcodec_DIR=${PREFIX}/{{ nvimgcodec_cmakedir }} -GNinja test  # [unix and build_platform == target_platform]
        - cmake --build .  # [unix and build_platform == target_platform]
        # - test ! -f ${PREFIX}/{{ nvimgcodec_libdir }}/libnvimgcodec_static.a  # [unix]

  - name: libnvimgcodec
    build:
      noarch: generic
    requirements:
      host:
        - {{ pin_subpackage('libnvimgcodec' ~ somajor, max_pin=None) }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      run:
        # FIXME: max_pin=None when library is stable
        - {{ pin_subpackage('libnvimgcodec' ~ somajor, max_pin="x.x.x") }}
    test:
      commands: []
    about:
      summary: The nvImageCodec runtime library.
      description: >-
        This is a runtime package only. Developers should install libnvimgcodec-dev to build with nvImageCodec.
      license: Apache-2.0
      license_family: APACHE
      license_file:
        - LICENSE.txt
        - Acknowledgements.txt

  - name: libnvimgcodec{{ somajor }}
    files:
      include:
        - {{ nvimgcodec_libdir }}/libnvimgcodec.so.*  # [linux]
        - {{ nvimgcodec_extdir }}/*.so.*  # [linux]
        - {{ nvimgcodec_win_bindir }}/nvimgcodec_{{ somajor }}.dll  # [win]
        - {{ nvimgcodec_win_extdir }}/*.dll  # [win]
      exclude:
        - {{ nvimgcodec_extdir }}/*opencv*  # [linux]
        - {{ nvimgcodec_extdir }}/*libtiff*  # [linux]
        - {{ nvimgcodec_extdir }}/*libjpeg*  # [linux]
        - {{ nvimgcodec_win_extdir }}/*opencv*  # [win]
        - {{ nvimgcodec_win_extdir }}/*libtiff*  # [win]
        - {{ nvimgcodec_win_extdir }}/*libjpeg*  # [win]
    build:
      missing_dso_whitelist:
        - '*/libcuda.so.*'  # [linux]
        - '*/nvcuda.dll'  # [win]
      # Implement enhanced CUDA compatability for CTK packages
      ignore_run_exports:
        - cuda-version
      ignore_run_exports_from:
        - cuda-cudart-dev
        - libnvjpeg-dev
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cuda') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      host:
        - cuda-version {{ cuda_compiler_version }}
        - cuda-cudart-dev
        - cuda-driver-dev  # [linux]
        - libnvjpeg-dev
        - libnvjpeg2k-dev
        - libnvtiff-dev
      run:
        - {{ pin_compatible('cuda-version', min_pin='x', max_pin='x') }}
        - cuda-cudart
        - libnvjpeg
      run_constrained:
        - {{ pin_subpackage('libnvimgcodec-libtiff-ext', exact=True) }}
        - {{ pin_subpackage('libnvimgcodec-libopencv-ext', exact=True) }}
        - {{ pin_subpackage('libnvimgcodec-libjpeg-turbo-ext', exact=True) }}
    test:
      commands:
        - test -f ${PREFIX}/{{ nvimgcodec_libdir }}/libnvimgcodec.so.{{ somajor }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_libdir }}/libnvimgcodec.so.{{ version }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libnvbmp_ext.so.{{ version }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libnvjpeg_ext.so.{{ version }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libnvjpeg2k_ext.so.{{ version }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libnvpnm_ext.so.{{ version }}  # [linux]
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libnvtiff_ext.so.{{ version }}  # [linux]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\nvimgcodec_{{ somajor }}.dll exit 1  # [win]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\nvbmp_ext_{{ somajor }}.dll exit 1  # [win]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\nvjpeg_ext_{{ somajor }}.dll exit 1  # [win]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\nvjpeg2k_ext_{{ somajor }}.dll exit 1  # [win]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\nvpnm_ext_{{ somajor }}.dll exit 1  # [win]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\nvtiff_ext_{{ somajor }}.dll exit 1  # [win]
    about:
      summary: The nvImageCodec runtime library.
      description: >-
        This is a runtime package only. Developers should install libnvimgcodec-dev to build with nvImageCodec.
      license: Apache-2.0
      license_family: APACHE
      license_file:
        - LICENSE.txt
        - Acknowledgements.txt

# loadable modules; optional and only needed at runtime

  - name: libnvimgcodec-libjpeg-turbo-ext
    files:
      - {{ nvimgcodec_extdir }}/*libjpeg*.so.*  # [linux]
      - {{ nvimgcodec_win_extdir }}/*libjpeg*.dll  # [win]
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      host:
        - libjpeg-turbo
    test:
      commands:
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libjpeg_turbo_ext.so.{{ version }}  # [linux]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\libjpeg_turbo_ext_{{ somajor }}.dll exit 1  # [win]
    about:
      summary: Install this package to enable libjpeg extensions for nvImageCodec
      description: >-
        This is a runtime package only. Developers should install libnvimgcodec-dev to build with nvImageCodec.
      license: Apache-2.0
      license_family: APACHE
      license_file:
        - LICENSE.txt
        - Acknowledgements.txt

  - name: libnvimgcodec-libtiff-ext
    files:
      - {{ nvimgcodec_extdir }}/*libtiff*.so.*  # [linux]
      - {{ nvimgcodec_win_extdir }}/*libtiff*.dll  # [win]
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      host:
        - libtiff
    test:
      commands:
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libtiff_ext.so.{{ version }}  # [linux]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\libtiff_ext_{{ somajor }}.dll exit 1  # [win]
    about:
      summary: Install this package to enable libtiff extensions for nvImageCodec
      description: >-
        This is a runtime package only. Developers should install libnvimgcodec-dev to build with nvImageCodec.
      license: Apache-2.0
      license_family: APACHE
      license_file:
        - LICENSE.txt
        - Acknowledgements.txt

  - name: libnvimgcodec-libopencv-ext
    files:
      - {{ nvimgcodec_extdir }}/*libopencv*.so.*  # [linux]
      - {{ nvimgcodec_win_extdir }}/*opencv*.dll  # [win]
    requirements:
      build:
        - {{ compiler('c') }}
        - {{ compiler('cxx') }}
        - {{ stdlib('c') }}
        - arm-variant * {{ arm_variant_type }}  # [linux and aarch64 and cuda_compiler_version != "None"]
      host:
        # libopencv >=4.13.0 is required for our 12-bit JP2 decode tests through the
        # opencv extension: 4.13.0 build 8 is the first conda-forge libopencv built
        # with WITH_OPENJPEG=1. Keep this on OpenCV 4 until the CMake package
        # discovery supports OpenCV 5 config packages.
        - libopencv >=4.13.0,<5
        - libopencv * headless*
    test:
      commands:
        - test -f ${PREFIX}/{{ nvimgcodec_extdir }}/libopencv_ext.so.{{ version }}  # [linux]
        - if not exist %LIBRARY_BIN%\\{{ cuda_major }}\\extensions\\opencv_ext_{{ somajor }}.dll exit 1  # [win]
    about:
      summary: Install this package to enable opencv extensions for nvImageCodec
      description: >-
        This is a runtime package only. Developers should install libnvimgcodec-dev to build with nvImageCodec.
      license: Apache-2.0
      license_family: APACHE
      license_file:
        - LICENSE.txt
        - Acknowledgements.txt

# NOTE: Metadata inheritance from this section to the outputs is all or nothing. Only the
# -dev package and the feedstock readme are inheriting this metadata.
about:
  home: https://github.com/NVIDIA/nvImageCodec
  summary: The C API development package for nvImageCodec.
  description: >
    nvImageCodec is an open-source library of accelerated codecs with unified interface. This package is the C-API only. See nvimgcodec for the Python-API.
  license: Apache-2.0
  license_family: APACHE
  license_file:
    - LICENSE.txt
    - Acknowledgements.txt

extra:
  feedstock-name: libnvimgcodec
  recipe-maintainers:
    - conda-forge/cuda
